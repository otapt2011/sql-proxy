<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northwind JSON Explorer</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 1rem; }
    button, input, select { padding: 0.5rem; margin: 0.5rem 0; width: 100%; }
    pre { background: #f0f0f0; padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>📦 Northwind Explorer (JSON)</h1>
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="Your API_SECRET_KEY">
  <button id="saveKey">Save Key</button>
  <label>Select Table</label>
  <select id="tableSelect"></select>
  <button id="loadTable">Load Table</button>
  <pre id="output"></pre>

  <script>
    let apiKey = localStorage.getItem('myKey') || '';
    document.getElementById('apiKey').value = apiKey;
    document.getElementById('saveKey').onclick = () => {
      apiKey = document.getElementById('apiKey').value.trim();
      localStorage.setItem('myKey', apiKey);
      loadTables();
    };

    async function loadTables() {
      const res = await fetch('/api/db?sql=sqlite_master', {
        headers: { 'X-API-Key': apiKey }
      });
      const data = await res.json();
      if (data.rows) {
        const select = document.getElementById('tableSelect');
        select.innerHTML = data.rows.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
      }
    }

    document.getElementById('loadTable').onclick = async () => {
      const table = document.getElementById('tableSelect').value;
      const res = await fetch(`/api/db?table=${table}`, {
        headers: { 'X-API-Key': apiKey }
      });
      const data = await res.json();
      document.getElementById('output').innerText = JSON.stringify(data, null, 2);
    };

    if (apiKey) loadTables();
  </script>
</body>
</html>
