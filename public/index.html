<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Northwind Explorer</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 1rem; background: #f5f5f5; }
    .card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
    select, button, input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 12px; border: 1px solid #ccc; }
    button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
    pre { background: #1e1e2e; color: #f0f0f0; padding: 1rem; overflow-x: auto; border-radius: 12px; }
  </style>
</head>
<body>
<div class="card">
  <h2>📦 Northwind Database Explorer</h2>
  <label>🔐 API Key</label>
  <input type="password" id="apiKey" placeholder="Your API_SECRET_KEY">
  <button id="saveKey">Save Key</button>
  <label>📋 Table</label>
  <select id="tableSelect"></select>
  <button id="loadBtn">Load Table</button>
  <pre id="output">Click Load Table to see data</pre>
</div>

<script>
  let apiKey = localStorage.getItem('myKey') || '';
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('saveKey').onclick = () => {
    apiKey = document.getElementById('apiKey').value.trim();
    localStorage.setItem('myKey', apiKey);
    loadTables();
  };

  async function loadTables() {
    if (!apiKey) return;
    const res = await fetch('/api/db', { headers: { 'X-API-Key': apiKey } });
    const data = await res.json();
    if (data.tables) {
      const select = document.getElementById('tableSelect');
      select.innerHTML = data.tables.map(t => `<option value="${t}">${t}</option>`).join('');
    }
  }

  document.getElementById('loadBtn').onclick = async () => {
    const table = document.getElementById('tableSelect').value;
    if (!table) return;
    const res = await fetch(`/api/db?table=${table}`, { headers: { 'X-API-Key': apiKey } });
    const data = await res.json();
    document.getElementById('output').innerText = JSON.stringify(data.data || data, null, 2);
  };

  if (apiKey) loadTables();
</script>
</body>
</html>
